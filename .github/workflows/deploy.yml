name: Deploy to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install CLI dependencies
        run: npm install
        working-directory: cli

      - name: Build CLI app
        run: node cli/scripts/build-cli.js

      - name: Package app for transfer
        run: tar -czf /tmp/9router-app.tar.gz -C cli/app .

      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: /tmp/9router-app.tar.gz
          target: /tmp
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            rm -rf /opt/9router/app.bak
            mv /opt/9router/app /opt/9router/app.bak 2>/dev/null || true
            mkdir -p /opt/9router/app
            tar -xzf /tmp/9router-app.tar.gz -C /opt/9router/app
            rm /tmp/9router-app.tar.gz
            sudo systemctl restart 9router 2>/dev/null || echo "Service not yet installed, run setup first"
            sudo systemctl enable 9router 2>/dev/null || true
