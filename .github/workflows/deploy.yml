name: Deploy to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: 9router:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save and compress image
        run: |
          docker save 9router:latest | gzip > 9router.tar.gz

      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 9router.tar.gz
          target: /tmp

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo docker load < /tmp/9router.tar.gz
            sudo docker stop 9router 2>/dev/null || true
            sudo docker rm 9router 2>/dev/null || true
            sudo docker run -d \
              --name 9router \
              --restart always \
              -p 20128:20128 \
              -v 9router-data:/app/data \
              -e DATA_DIR=/app/data \
              -e PORT=20128 \
              -e HOSTNAME=0.0.0.0 \
              -e NODE_ENV=production \
              9router:latest
            rm -f /tmp/9router.tar.gz
            sudo docker image prune -f
